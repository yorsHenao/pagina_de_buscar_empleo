    <script type="text/babel">

        //componente que remplaza el fetch para mostrar una tarjeta de empleo
        // usamos {} por que es destructuración de objetos, lo que hace es extraer las propiedades del objeto que se le pasa como argumento a la función, en este caso el objeto con las propiedades titulo, empresa, ubicacion y descripcion
        function JobCard ({data, titulo, empresa, ubicacion, descripcion}){
           const [isApplied, setIsApplied] = React.useState(false) //iniciamos en false

            //funcion para manejar el click del boton de aplicar, - muestra una alerta
            function handleClick() {
                setIsApplied(!isApplied) //cambia el estado de isApplied a su valor contrario, si es false lo cambia a true y viceversa;
            }

            const text = isApplied ? "Aplicado" : "Aplicar";
            const buttonClass = isApplied ? "is-applied" : " "
            
            return (
                <article className="job-listing-card"
                data-modalidad={data.location}
                data-experience={data.experience}
                data-technology={data.technology}
                >
                    <div>
                        <h3>{titulo}</h3>
                        <small>{empresa} - {ubicacion}</small>
                        <p>{descripcion}</p>
                    </div>
                    <button 
                    className="button-apply-job"
                    onClick={handleClick}
                    >
                    
                    
                    {text}
                    </button>
                </article>
            )
            
        }

        function App() {
            return (
                <div className="jobs-listings">
                    <JobCard
                    titulo="Desarrollador Frontend"
                    empresa="Tech Solutions"
                    ubicacion="Remoto"
                    descripcion="Buscamos un desarrollador frontend con experiencia en React.js para unirse a nuestro equipo dinámico."
                    
                    //data es un prop -> osea una propiedad que le pasamos al componente JobCard, lo que hacemos es pasarle un objeto con las propiedades modalidad, experience y technology, que son las mismas que usamos en el componente JobCard para asignarlas a los atributos data-modalidad, data-experience y data-technology respectivamente
                    data={{location: "remoto", experience: "mid", technology: "react"}}
                    />
                </div>

            )

        }

        //rootEL recupera el elemento del DOM con el id root
        const rootEl = document.querySelector("#root");
        //creamos una raist de react, e indicomos donde se va a renderizar el contenido de react
        const root = ReactDOM.createRoot(rootEl)

        //acá agregamos el elemento o componente que queremos renderizar
        //para renderizar el componente App, lo que hacemos es escribirlo como si fuera una etiqueta HTML, con la sintaxis de JSX
        root.render(<App />);
        
    </script>
